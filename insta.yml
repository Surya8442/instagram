apiVersion: apps/v1
kind: Deployment
metadata:
  name: instadeploy
  labels:
    app: instaapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: instaapp
  template:
    metadata:
      labels:
        app: instaapp
    spec:
      containers:
        - name: instacont
          image: surya8442/instagram:v1
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: insta
spec:
  selector:
    app: instaapp
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 80
  type: ClusterIP
